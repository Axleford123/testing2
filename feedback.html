<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Quantum Core Systems</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <article class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="images/Futuristic QCS logo design.png" alt="Quantum Core Systems Logo" style="height: 55px;">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <nav class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="product-detail.html">Shop</a></li>
                        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                        <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
                        <li class="nav-item"><a class="nav-link" href="post-purchase.html">My Orders</a></li>
                        <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                    </ul>
                </nav>
            </article>
        </nav>
    </header>

    <main class="container py-5">
        <h1 class="text-center mb-5">We Value Your Feedback</h1>
        
        <article class="card mx-auto" style="max-width: 700px;">
            <article class="card-body">
                <form id="feedbackForm">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required>
                    
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" required>
                    
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="6" required></textarea>
                    
                    <button type="submit" class="btn btn-dark btn-lg w-100 mt-4">Submit Feedback</button>
                </form>
            </article>
        </article>
    </main>

    <footer class="py-5 text-center">
        <p>&copy; 2026 Quantum Core Systems. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("✅ Thank you for your feedback! We appreciate your input.");
            this.reset();
        });
    </script>
</body>
</html>
