<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Quantum Core Systems</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg">
            <article class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="images/Futuristic QCS logo design.png" alt="Quantum Core Systems Logo" style="height: 55px;">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <nav class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="product-detail.html">Shop</a></li>
                        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                        <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
                        <li class="nav-item"><a class="nav-link" href="post-purchase.html">My Orders</a></li>
                        <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                    </ul>
                </nav>
            </article>
        </nav>
    </header>

    <main class="container py-5">
        <h1 class="mb-4">Checkout</h1>
        
        <article class="row">
            <article class="col-lg-7">
                <article class="card">
                    <article class="card-body">
                        <h5>Shipping Information</h5>
                        <form id="checkoutForm">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                            
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                            
                            <label class="form-label">Shipping Address</label>
                            <textarea class="form-control" rows="3" required></textarea>
                            
                            <button type="submit" class="btn btn-dark btn-lg w-100 mt-4">Place Order</button>
                        </form>
                    </article>
                </article>
            </article>
            
            <article class="col-lg-5">
                <article class="card">
                    <article class="card-body">
                        <h5>Order Summary</h5>
                        <p>Gaming Laptop XYZ × 1</p>
                        <hr>
                        <h5>Total: <span class="text-success">P24,999</span></h5>
                    </article>
                </article>
            </article>
        </article>
    </main>

    <footer class="py-5 text-center">
        <p>&copy; 2026 Quantum Core Systems. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("✅ Order placed successfully! Thank you for shopping with Quantum Core.");
            window.location.href = "post-purchase.html";
        });
    </script>
</body>
</html>
